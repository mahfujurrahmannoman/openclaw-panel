name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-20250514
          direct_prompt: |
            Review this PR for:
            1. Security vulnerabilities (XSS, injection, auth bypass)
            2. Bug risks and logic errors
            3. Performance issues
            4. Code quality and best practices

            This is a Node.js + Express + SQLite project with React frontend (CDN, no build tools).
            Key areas: Easypanel API integration, Docker container management, WebSocket terminals, S3 backups.

            Be concise. Only comment on actual issues, not style preferences.
