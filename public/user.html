<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw - User Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/@xterm/xterm@5.5.0/css/xterm.css">
  <script src="https://unpkg.com/@xterm/xterm@5.5.0/lib/xterm.js"></script>
  <script src="https://unpkg.com/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'IBM Plex Sans', sans-serif; background: #fafbfc; color: #18181b; min-height: 100vh; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    :root {
      --bg: #fafbfc; --card: #ffffff; --border: #e4e4e7; --accent: #6366f1;
      --accent-hover: #4f46e5; --success: #16a34a; --warning: #d97706; --danger: #dc2626;
      --text: #18181b; --text-dim: #71717a; --text-muted: #a1a1aa;
    }
    input, select, textarea, button { font-family: inherit; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); }

    /* Layout */
    .topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
    .topbar-brand { display: flex; align-items: center; gap: 10px; }
    .topbar-brand h1 { font-size: 18px; font-weight: 700; color: var(--accent); }
    .topbar-brand span { font-size: 12px; color: var(--text-dim); }
    .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

    /* Cards */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .card h3 { font-size: 14px; font-weight: 600; color: var(--text-dim); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .5px; }

    /* Info rows */
    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f4f4f5; }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-size: 13px; color: var(--text-dim); }
    .info-value { font-size: 13px; font-weight: 500; }
    .info-value.mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; }

    /* Badges */
    .badge { display: inline-block; padding: 2px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; }
    .badge-active { background: #dcfce7; color: var(--success); }
    .badge-suspended { background: #fef2f2; color: var(--danger); }
    .badge-plan { background: #eef2ff; color: var(--accent); }

    /* Buttons */
    .btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
    .btn:hover { background: #f4f4f5; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-danger { color: var(--danger); border-color: rgba(220,38,38,.3); }

    /* Meter */
    .meter { height: 8px; background: #e4e4e7; border-radius: 99px; overflow: hidden; }
    .meter-fill { height: 100%; border-radius: 99px; transition: width .5s; }
    .meter-green { background: var(--success); }
    .meter-amber { background: var(--warning); }
    .meter-red { background: var(--danger); }
    .meter-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-top: 4px; }

    /* Form */
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; font-weight: 500; }
    .form-group input, .form-group select { width: 100%; padding: 8px 12px; background: #fafbfc; border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; }
    .form-group input:focus, .form-group select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Token display */
    .token-display { display: flex; align-items: center; gap: 8px; background: #f4f4f5; padding: 6px 10px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; word-break: break-all; }
    .token-toggle { cursor: pointer; color: var(--accent); font-size: 12px; white-space: nowrap; user-select: none; }

    /* Logs */
    .logs-box { background: #18181b; color: #a1a1aa; padding: 14px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 11px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; line-height: 1.6; }

    /* Toast */
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 12px 16px; border-radius: 8px; font-size: 13px; animation: slideIn .3s; max-width: 360px; }
    .toast-success { background: #dcfce7; border: 1px solid #bbf7d0; color: var(--success); }
    .toast-error { background: #fef2f2; border: 1px solid #fecaca; color: var(--danger); }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

    /* Login */
    .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #eef2ff 0%, #fafbfc 100%); }
    .login-box { width: 380px; }
    .login-box h1 { font-size: 24px; text-align: center; margin-bottom: 4px; color: var(--accent); }
    .login-box p { text-align: center; color: var(--text-dim); font-size: 13px; margin-bottom: 24px; }

    /* Quick actions */
    .quick-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    /* Nav tabs */
    .nav-tabs { display: flex; gap: 0; background: var(--card); border-bottom: 1px solid var(--border); padding: 0 24px; }
    .nav-tab { padding: 12px 20px; font-size: 13px; font-weight: 500; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; }
    .nav-tab:hover { color: var(--text); }
    .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Terminal */
    .terminal-container { background: #1e1e2e; border-radius: 12px; overflow: hidden; border: 1px solid #313244; }
    .terminal-header { background: #181825; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #313244; }
    .terminal-header .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .terminal-header .title { font-size: 12px; color: #cdd6f4; font-family: 'JetBrains Mono', monospace; }
    .terminal-body { height: 480px; padding: 4px; }
    .terminal-status { font-size: 11px; padding: 2px 8px; border-radius: 99px; }
    .terminal-status.connected { background: rgba(34,197,94,.15); color: var(--success); }
    .terminal-status.disconnected { background: rgba(239,68,68,.15); color: var(--danger); }
    .terminal-status.connecting { background: rgba(245,158,11,.15); color: var(--warning); }

    /* Setup Guide */
    .guide-step { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin-bottom: 16px; position: relative; }
    .guide-step .step-num { position: absolute; top: -12px; left: 20px; background: var(--accent); color: #fff; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
    .guide-step h4 { font-size: 15px; font-weight: 600; margin-bottom: 8px; padding-right: 80px; }
    .guide-step p { font-size: 13px; color: var(--text-dim); line-height: 1.7; }
    .guide-step .step-badge { position: absolute; top: 16px; right: 16px; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
    .step-badge.critical { background: rgba(239,68,68,.1); color: var(--danger); }
    .step-badge.first { background: rgba(99,102,241,.1); color: var(--accent); }
    .step-badge.popular { background: rgba(34,197,94,.1); color: var(--success); }
    .step-badge.optional { background: rgba(161,161,170,.1); color: var(--text-muted); }
    .cmd-box { background: #1e1e2e; color: #cdd6f4; padding: 10px 14px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 12px; margin: 8px 0; position: relative; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
    .cmd-box .copy-btn { position: absolute; top: 6px; right: 8px; background: #313244; border: none; color: #cdd6f4; padding: 2px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }
    .cmd-box .copy-btn:hover { background: #45475a; }
    .tip-box { background: #eef2ff; border: 1px solid rgba(99,102,241,.2); border-radius: 8px; padding: 10px 14px; margin: 8px 0; font-size: 12px; color: var(--accent); }
    .warn-box { background: #fef3c7; border: 1px solid rgba(217,119,6,.2); border-radius: 8px; padding: 10px 14px; margin: 8px 0; font-size: 12px; color: #92400e; }
    .guide-table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 10px 0; }
    .guide-table th { background: #f4f4f5; text-align: left; padding: 8px 10px; font-weight: 600; }
    .guide-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
    .guide-table tr:last-child td { border-bottom: none; }
    .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-box { text-align: center; padding: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; }
    .stat-box .num { font-size: 22px; font-weight: 700; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
    .stat-box .lbl { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

    /* Dashboard Grid */
    .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .dash-full { grid-column: 1 / -1; }
    .health-banner { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-radius: 12px; margin-bottom: 16px; }
    .health-banner.healthy { background: linear-gradient(135deg, #dcfce7, #f0fdf4); border: 1px solid #bbf7d0; }
    .health-banner.degraded { background: linear-gradient(135deg, #fef3c7, #fffbeb); border: 1px solid #fde68a; }
    .health-banner.down { background: linear-gradient(135deg, #fef2f2, #fff1f1); border: 1px solid #fecaca; }
    .health-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .gauge-row { display: flex; gap: 32px; justify-content: center; padding: 16px 0; }
    .net-stat-row { display: flex; gap: 12px; margin-top: 8px; }
    .net-stat-item { flex: 1; display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: #f4f4f5; border-radius: 8px; }

    /* Responsive */
    @media (max-width: 640px) {
      .container { padding: 16px 12px; }
      .form-row { grid-template-columns: 1fr; }
      .quick-actions { flex-direction: column; }
      .info-row { flex-direction: column; align-items: flex-start; gap: 2px; }
      .stat-row { grid-template-columns: repeat(2, 1fr); }
      .nav-tabs { padding: 0 8px; }
      .nav-tab { padding: 10px 12px; font-size: 12px; }
      .dash-grid { grid-template-columns: 1fr; }
      .gauge-row { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ===== API Helper =====
const api = {
  token: localStorage.getItem('user_token'),
  async request(url, opts = {}) {
    const headers = { 'Content-Type': 'application/json' };
    if (this.token) headers['Authorization'] = `Bearer ${this.token}`;
    const res = await fetch(url, { ...opts, headers });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  },
  get: (url) => api.request(url),
  post: (url, body) => api.request(url, { method: 'POST', body: JSON.stringify(body) }),
};

// ===== Toast =====
let toastId = 0;
function ToastContainer({ toasts }) {
  return (
    <div className="toast-container">
      {toasts.map(t => <div key={t.id} className={`toast toast-${t.type}`}>{t.msg}</div>)}
    </div>
  );
}

// ===== Meter =====
function Meter({ value, max, label }) {
  const pct = max > 0 ? Math.min((value / max) * 100, 100) : 0;
  const cls = pct < 50 ? 'meter-green' : pct < 80 ? 'meter-amber' : 'meter-red';
  return (
    <div>
      <div className="meter"><div className={`meter-fill ${cls}`} style={{ width: `${pct}%` }}/></div>
      <div className="meter-info">
        <span>{label}</span>
        <span className="mono">{pct.toFixed(1)}%</span>
      </div>
    </div>
  );
}

// ===== Login =====
function LoginPage({ onLogin, addToast }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setLoading(true);
    try {
      const data = await api.post('/api/user/login', { email, password });
      api.token = data.token;
      localStorage.setItem('user_token', data.token);
      onLogin(data.user);
    } catch (err) {
      addToast(err.message, 'error');
    }
    setLoading(false);
  };

  return (
    <div className="login-container">
      <div className="login-box card">
        <h1>OpenClaw</h1>
        <p>Sign in to your hosting panel</p>
        <form onSubmit={handleSubmit}>
          <div className="form-group">
            <label>Email or Username</label>
            <input type="text" value={email} onChange={e => setEmail(e.target.value)} placeholder="email@example.com or username" required />
          </div>
          <div className="form-group">
            <label>Password</label>
            <input type="password" value={password} onChange={e => setPassword(e.target.value)} required />
          </div>
          <button className="btn btn-primary" style={{ width: '100%', justifyContent: 'center', marginTop: 8 }} disabled={loading}>
            {loading ? 'Signing in...' : 'Sign In'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ===== formatBytes =====
function formatBytes(bytes) {
  if (bytes == null || bytes === 0) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB', 'TB'];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));
  const idx = Math.min(i, units.length - 1);
  return (bytes / Math.pow(1024, idx)).toFixed(1) + ' ' + units[idx];
}

// ===== RadialGauge =====
function RadialGauge({ value, max, sublabel }) {
  const pct = max > 0 ? Math.min((value / max) * 100, 100) : 0;
  const r = 38;
  const strokeWidth = 7;
  const circumference = 2 * Math.PI * r;
  const offset = circumference - (pct / 100) * circumference;
  const color = pct < 50 ? '#16a34a' : pct < 80 ? '#d97706' : '#dc2626';

  return (
    <div style={{ textAlign: 'center', width: 130 }}>
      <svg viewBox="0 0 100 100" width="120" height="120">
        <circle cx="50" cy="50" r={r} fill="none" stroke="#e4e4e7" strokeWidth={strokeWidth} />
        <circle
          cx="50" cy="50" r={r} fill="none"
          stroke={color} strokeWidth={strokeWidth}
          strokeLinecap="round"
          strokeDasharray={circumference}
          strokeDashoffset={offset}
          transform="rotate(-90 50 50)"
          style={{ transition: 'stroke-dashoffset 0.8s ease' }}
        />
        <text x="50" y="48" textAnchor="middle" dominantBaseline="middle"
          style={{ fontSize: '16px', fontWeight: 700, fontFamily: "'JetBrains Mono', monospace", fill: '#18181b' }}>
          {pct.toFixed(1)}%
        </text>
        {sublabel && (
          <text x="50" y="62" textAnchor="middle" dominantBaseline="middle"
            style={{ fontSize: '8px', fill: '#71717a', fontFamily: "'IBM Plex Sans', sans-serif" }}>
            {sublabel}
          </text>
        )}
      </svg>
    </div>
  );
}

// ===== HealthBanner =====
function HealthBanner({ task, status }) {
  let cls, icon, iconBg, text;

  if (status === 'suspended') {
    cls = 'down';
    icon = '\u26D4';
    iconBg = '#fecaca';
    text = 'Account Suspended - Contact admin';
  } else if (task && task.actual >= task.desired) {
    cls = 'healthy';
    icon = '\u2714';
    iconBg = '#bbf7d0';
    text = 'Service Running';
  } else if (task && task.actual > 0 && task.actual < task.desired) {
    cls = 'degraded';
    icon = '\u26A0';
    iconBg = '#fde68a';
    text = 'Service Degraded';
  } else {
    cls = 'down';
    icon = '\u2716';
    iconBg = '#fecaca';
    text = 'Service Stopped - Try restarting';
  }

  return (
    <div className={`health-banner ${cls}`}>
      <div className="health-icon" style={{ background: iconBg }}>{icon}</div>
      <div>
        <div style={{ fontWeight: 600, fontSize: 14 }}>{text}</div>
        {task && <div style={{ fontSize: 11, color: 'var(--text-dim)', marginTop: 2 }}>Replicas: {task.actual ?? 0} / {task.desired ?? 0}</div>}
      </div>
    </div>
  );
}

// ===== Dashboard =====
function Dashboard({ addToast }) {
  const [profile, setProfile] = useState(null);
  const [stats, setStats] = useState(null);
  const [logs, setLogs] = useState(null);
  const [showToken, setShowToken] = useState(false);
  const [showPairToken, setShowPairToken] = useState(false);
  const [showLogs, setShowLogs] = useState(false);
  const [restarting, setRestarting] = useState(false);
  const [lastUpdated, setLastUpdated] = useState(null);

  // Telegram form
  const [tgBot, setTgBot] = useState('');
  const [tgChat, setTgChat] = useState('');
  const [tgSaving, setTgSaving] = useState(false);

  // API key form
  const [apiProvider, setApiProvider] = useState('deepseek');
  const [apiKeyVal, setApiKeyVal] = useState('');
  const [apiSaving, setApiSaving] = useState(false);

  const load = useCallback(async () => {
    try {
      const p = await api.get('/api/user/profile');
      setProfile(p);
      setTgBot(p.telegram_bot_token || '');
      setTgChat(p.telegram_chat_id || '');
      setApiProvider(p.api_key_provider || 'deepseek');
    } catch (err) { addToast(err.message, 'error'); }
    try { setStats(await api.get('/api/user/stats')); } catch (_) {}
    setLastUpdated(new Date());
  }, []);

  useEffect(() => {
    load();
    const interval = setInterval(load, 10000);
    return () => clearInterval(interval);
  }, [load]);

  const handleRestart = async () => {
    setRestarting(true);
    try {
      await api.post('/api/user/restart');
      addToast('Service restarting...', 'success');
    } catch (err) { addToast(err.message, 'error'); }
    setRestarting(false);
  };

  const handleTelegram = async () => {
    setTgSaving(true);
    try {
      await api.post('/api/user/telegram', { botToken: tgBot, chatId: tgChat });
      addToast('Telegram settings saved', 'success');
    } catch (err) { addToast(err.message, 'error'); }
    setTgSaving(false);
  };

  const handleApiKey = async () => {
    if (!apiKeyVal) return addToast('Enter an API key', 'error');
    setApiSaving(true);
    try {
      await api.post('/api/user/apikey', { provider: apiProvider, apiKey: apiKeyVal });
      addToast('API key saved and service redeploying', 'success');
      setApiKeyVal('');
    } catch (err) { addToast(err.message, 'error'); }
    setApiSaving(false);
  };

  const loadLogs = async () => {
    try {
      const l = await api.get('/api/user/logs');
      setLogs(typeof l === 'string' ? l : JSON.stringify(l, null, 2));
    } catch (err) { setLogs('Failed to load logs: ' + err.message); }
    setShowLogs(true);
  };

  if (!profile) return <div className="container" style={{ color: 'var(--text-dim)', paddingTop: 48 }}>Loading...</div>;

  // Parse new stats format: { containers, task }
  const containers = stats && stats.containers ? stats.containers : [];
  const containerStat = Array.isArray(containers) && containers.length > 0 ? containers[0] : null;
  const task = stats && stats.task ? stats.task : null;

  // Parse stats — handle both nested and flat formats from Easypanel API
  const cpuRaw = containerStat?.stats?.cpu?.percent ?? containerStat?.cpuPercent ?? containerStat?.cpu ?? 0;
  const cpuPct = typeof cpuRaw === 'string' ? parseFloat(cpuRaw) : cpuRaw;
  const memRaw = containerStat?.stats?.memory?.percent ?? containerStat?.memoryPercent ?? containerStat?.memPercent ?? 0;
  const memPct = typeof memRaw === 'string' ? parseFloat(memRaw) : memRaw;
  const memUsage = containerStat?.stats?.memory?.usage ?? 0;
  const netIn = containerStat?.stats?.network?.in ?? containerStat?.networkInput ?? 0;
  const netOut = containerStat?.stats?.network?.out ?? containerStat?.networkOutput ?? 0;

  return (
    <div className="container">
      {/* Welcome */}
      <div style={{ marginBottom: 20, display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 8 }}>
        <div>
          <h2 style={{ fontSize: 22, fontWeight: 600 }}>Hello, {profile.username}</h2>
          <div style={{ marginTop: 4 }}>
            <span className={`badge badge-${profile.status}`}>{profile.status}</span>
            <span className="badge" style={{ marginLeft: 6, background: '#f3e8ff', color: '#7c3aed' }}>unlimited</span>
          </div>
        </div>
        {lastUpdated && (
          <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>
            Last updated: {lastUpdated.toLocaleTimeString()}
          </div>
        )}
      </div>

      {/* Health Banner */}
      <HealthBanner task={task} status={profile.status} />

      {/* Grid: Service Info + Resource Gauges */}
      <div className="dash-grid">
        {/* Service Info Card */}
        <div className="card" style={{ marginBottom: 0 }}>
          <h3>Service Info</h3>
          <div className="info-row">
            <span className="info-label">OpenClaw URL</span>

// ===== CmdBox (copyable command) =====
function CmdBox({ children, onCopy }) {
  const copy = () => { navigator.clipboard.writeText(children); if (onCopy) onCopy('Command copied!'); };
  return (
    <div className="cmd-box">
      {children}
      <button className="copy-btn" onClick={copy}>Copy</button>
    </div>
  );
}

// ===== Console Page =====
function ConsolePage({ addToast }) {
  const termRef = useRef(null);
  const wsRef = useRef(null);
  const xtermRef = useRef(null);
  const fitRef = useRef(null);
  const [status, setStatus] = useState('disconnected');
  const [profile, setProfile] = useState(null);

  useEffect(() => { api.get('/api/user/profile').then(setProfile).catch(() => {}); }, []);

  const connect = useCallback(() => {
    if (wsRef.current && wsRef.current.readyState <= 1) return;
    setStatus('connecting');

    const proto = window.location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${window.location.host}/ws/terminal?token=${api.token}`);
    wsRef.current = ws;

    ws.onopen = () => {};

    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'output') {
          xtermRef.current?.write(msg.data);
        } else if (msg.type === 'connected') {
          setStatus('connected');
          addToast(msg.data, 'success');
          // Send terminal size and focus terminal for keyboard input
          if (xtermRef.current && fitRef.current) {
            fitRef.current.fit();
            const term = xtermRef.current;
            ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
            term.focus();
          }
        } else if (msg.type === 'error') {
          setStatus('disconnected');
          xtermRef.current?.write(`\r\n\x1b[31m${msg.data}\x1b[0m\r\n`);
        } else if (msg.type === 'exit') {
          setStatus('disconnected');
          xtermRef.current?.write('\r\n\x1b[33mSession ended.\x1b[0m\r\n');
        }
      } catch {
        xtermRef.current?.write(e.data);
      }
    };

    // Aggressive keep-alive: ping every 8s to prevent Traefik/proxy from killing WebSocket
    const pingId = setInterval(() => {
      if (ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'ping' }));
      } else {
        clearInterval(pingId);
      }
    }, 8000);

    ws.onclose = () => {
      setStatus('disconnected');
      clearInterval(pingId);
      xtermRef.current?.write('\r\n\x1b[33m[Connection closed. Click "Connect" to reconnect.]\x1b[0m\r\n');
    };
    ws.onerror = () => {
      setStatus('disconnected');
      clearInterval(pingId);
    };
  }, []);

  useEffect(() => {
    if (!termRef.current || xtermRef.current) return;

    const term = new window.Terminal({
      theme: {
        background: '#1e1e2e', foreground: '#cdd6f4', cursor: '#f5e0dc',
        selectionBackground: '#585b70', black: '#45475a', red: '#f38ba8',
        green: '#a6e3a1', yellow: '#f9e2af', blue: '#89b4fa',
        magenta: '#cba6f7', cyan: '#94e2d5', white: '#bac2de',
      },
      fontFamily: "'JetBrains Mono', monospace",
      fontSize: 13,
      cursorBlink: true,
      scrollback: 5000,
      allowProposedApi: true,
    });

    const fit = new window.FitAddon.FitAddon();
    term.loadAddon(fit);
    term.open(termRef.current);
    fit.fit();
    xtermRef.current = term;
    fitRef.current = fit;

    term.write('\x1b[36mOpenClaw Terminal\x1b[0m\r\n');
    term.write('\x1b[90mClick "Connect" to open a shell in your container.\x1b[0m\r\n\r\n');

    term.onData((data) => {
      if (wsRef.current?.readyState === 1) {
        wsRef.current.send(JSON.stringify({ type: 'input', data }));
      }
    });

    // Focus terminal on click so keyboard input works
    termRef.current.addEventListener('click', () => term.focus());

    // Also handle paste via browser
    term.attachCustomKeyEventHandler((e) => {
      // Allow Ctrl+V / Cmd+V paste
      if ((e.ctrlKey || e.metaKey) && e.key === 'v') return false;
      // Allow Ctrl+C / Cmd+C copy
      if ((e.ctrlKey || e.metaKey) && e.key === 'c' && term.hasSelection()) return false;
      return true;
    });

    const handleResize = () => { fit.fit(); };
    window.addEventListener('resize', handleResize);

    // Resize terminal in container when fit changes
    const resizeObs = new ResizeObserver(() => {
      fit.fit();
      if (wsRef.current?.readyState === 1) {
        wsRef.current.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      }
    });
    resizeObs.observe(termRef.current);

    return () => {
      window.removeEventListener('resize', handleResize);
      resizeObs.disconnect();
      wsRef.current?.close();
      term.dispose();
    };
  }, []);

  const disconnect = () => {
    wsRef.current?.close();
    setStatus('disconnected');
  };

  return (
    <div className="container">
      <div style={{ marginBottom: 16 }}>
        <h2 style={{ fontSize: 20, fontWeight: 600, marginBottom: 4 }}>Console</h2>
        <p style={{ fontSize: 13, color: 'var(--text-dim)' }}>Direct shell access to your OpenClaw container. Run commands, configure settings, and manage your instance.</p>
      </div>

      <div className="terminal-container">
        <div className="terminal-header">
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <div>
              <span className="dot" style={{ background: '#f38ba8' }} />
              <span className="dot" style={{ background: '#f9e2af' }} />
              <span className="dot" style={{ background: '#a6e3a1' }} />
            </div>
            <span className="title">openclaw-gateway — bash</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span className={`terminal-status ${status}`}>{status}</span>
            {status !== 'connected' ? (
              <button className="btn btn-primary" style={{ padding: '4px 14px', fontSize: 12 }} onClick={connect} disabled={status === 'connecting'}>
                {status === 'connecting' ? 'Connecting...' : 'Connect'}
              </button>
            ) : (
              <button className="btn btn-danger" style={{ padding: '4px 14px', fontSize: 12 }} onClick={disconnect}>Disconnect</button>
            )}
          </div>
        </div>
        <div className="terminal-body" ref={termRef} />
      </div>

      {/* SSH Access Info */}
      <div className="card" style={{ marginTop: 16, borderColor: 'rgba(34,197,94,.3)', background: 'linear-gradient(135deg, #f0fdf4 0%, #fafbfc 100%)' }}>
        <h3 style={{ fontSize: 14, fontWeight: 600, color: 'var(--success)', marginBottom: 8 }}>SSH Access (Recommended for Onboarding)</h3>
        <p style={{ fontSize: 12, color: 'var(--text-dim)', marginBottom: 10, lineHeight: 1.6 }}>
          For long tasks like onboarding, use SSH (PuTTY/Terminal) — it's more reliable than the web console.
        </p>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, marginBottom: 8 }}>
          <div style={{ background: '#f4f4f5', borderRadius: 8, padding: '8px 12px' }}>
            <div style={{ fontSize: 10, color: 'var(--text-dim)' }}>Host</div>
            <div className="mono" style={{ fontSize: 12, fontWeight: 600 }}>{window.location.hostname}</div>
          </div>
          <div style={{ background: '#f4f4f5', borderRadius: 8, padding: '8px 12px' }}>
            <div style={{ fontSize: 10, color: 'var(--text-dim)' }}>Port</div>
            <div className="mono" style={{ fontSize: 12, fontWeight: 600 }}>2222</div>
          </div>
          <div style={{ background: '#f4f4f5', borderRadius: 8, padding: '8px 12px' }}>
            <div style={{ fontSize: 10, color: 'var(--text-dim)' }}>Username</div>
            <div className="mono" style={{ fontSize: 12, fontWeight: 600 }}>{profile?.username || profile?.email || 'your-email'}</div>
          </div>
        </div>
        <div className="token-display" style={{ fontSize: 11, marginBottom: 6 }}>
          <span style={{ flex: 1 }}>ssh {profile?.username || profile?.email || 'user'}@{window.location.hostname} -p 2222</span>
          <span className="token-toggle" onClick={() => { navigator.clipboard.writeText(`ssh ${profile?.username || profile?.email || 'user'}@${window.location.hostname} -p 2222`); addToast('SSH command copied!', 'success'); }}>Copy</span>
        </div>
        <div style={{ fontSize: 11, color: 'var(--text-dim)' }}>Password: your panel login password</div>
      </div>

      <div style={{ marginTop: 16 }}>
        <h3 style={{ fontSize: 14, fontWeight: 600, color: 'var(--text-dim)', marginBottom: 8 }}>Quick Commands</h3>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: 8 }}>
          {[
            { label: 'Run onboarding (FIRST!)', cmd: 'node dist/index.js onboard --no-install-daemon' },
            { label: 'Get dashboard URL', cmd: 'node dist/index.js dashboard --no-open' },
            { label: 'List devices', cmd: 'node dist/index.js devices list' },
            { label: 'Approve device', cmd: 'node dist/index.js devices approve ' },
            { label: 'Approve Telegram', cmd: 'node dist/index.js pairing approve telegram ' },
            { label: 'List channels', cmd: 'node dist/index.js channels list' },
            { label: 'Connect WhatsApp', cmd: 'node dist/index.js channels login' },
            { label: 'Create alias', cmd: 'echo "alias openclaw=\'node dist/index.js\'" >> ~/.bashrc && source ~/.bashrc' },
          ].map((c, i) => (
            <div key={i} style={{ background: '#f4f4f5', borderRadius: 8, padding: '8px 12px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8 }}>
              <div>
                <div style={{ fontSize: 11, color: 'var(--text-dim)' }}>{c.label}</div>
                <div className="mono" style={{ fontSize: 11, color: 'var(--text)' }}>{c.cmd.length > 40 ? c.cmd.slice(0, 40) + '...' : c.cmd}</div>
              </div>
              <button className="btn" style={{ padding: '2px 8px', fontSize: 10, whiteSpace: 'nowrap' }}
                onClick={() => {
                  if (wsRef.current?.readyState === 1) {
                    wsRef.current.send(JSON.stringify({ type: 'input', data: c.cmd + '\n' }));
                  } else {
                    navigator.clipboard.writeText(c.cmd);
                    addToast('Copied! Connect first to run.', 'success');
                  }
                }}>
                {wsRef.current?.readyState === 1 ? 'Run' : 'Copy'}
              </button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

          <li>Disconnect and reconnect (this loads the alias)</li>
        </ol>
        <div className="tip-box">Why this alias? Instead of typing <code>node dist/index.js</code> every time, you can just type <code>openclaw</code>.</div>
      </div>

      {/* Step 2 */}
      <div className="guide-step">
        <div className="step-num">2</div>
        <span className="step-badge critical">Critical</span>
        <h4>Run the Onboarding Wizard</h4>
        <p>This is the most important step. The onboarding wizard sets up your AI model, channels, and configuration.</p>
        <CmdBox onCopy={addToast}>node dist/index.js onboard --no-install-daemon</CmdBox>
        <p style={{ marginTop: 8 }}>Or if alias doesn't work:</p>
        <CmdBox onCopy={addToast}>node dist/index.js onboard --no-install-daemon</CmdBox>
        <p style={{ marginTop: 12 }}>The wizard will ask you several questions:</p>
        <table className="guide-table">
          <thead><tr><th>Question</th><th>Your Answer</th></tr></thead>
          <tbody>
            <tr><td>I understand this is powerful and inherently risky. Continue?</td><td><strong>Yes</strong></td></tr>
            <tr><td>Onboarding mode</td><td><strong>QuickStart</strong></td></tr>
            <tr><td>Model/auth provider</td><td><strong>Google (free) / Anthropic / OpenAI</strong></td></tr>
            <tr><td>Auth method</td><td><strong>API Key</strong></td></tr>
            <tr><td>Enter API Key</td><td><strong>Paste your API key</strong></td></tr>
            <tr><td>Default model</td><td><strong>Choose preferred model</strong></td></tr>
            <tr><td>Select channel (Quickstart)</td><td><strong>Telegram (or your channel)</strong></td></tr>
            <tr><td>Telegram Bot Token</td><td><strong>Paste your bot token</strong></td></tr>
            <tr><td>Configure skills now?</td><td><strong>No (can do later)</strong></td></tr>
            <tr><td>Enable hooks?</td><td><strong>Skip for now</strong></td></tr>
            <tr><td>How to hatch your bot?</td><td><strong>Open the Web UI</strong></td></tr>
            <tr><td>Install shell completion?</td><td><strong>Yes</strong></td></tr>
          </tbody>
        </table>
        <div className="warn-box">You need an API Key! Get a free Google Gemini key from <strong>aistudio.google.com/apikey</strong> — or use Anthropic / OpenAI.</div>
        <div className="tip-box">How to get Telegram Bot Token: Open Telegram &rarr; Search <strong>@BotFather</strong> &rarr; Send <code>/newbot</code> &rarr; Follow the steps &rarr; Copy the token.</div>
      </div>

      {/* Step 3 */}
      <div className="guide-step">
        <div className="step-num">3</div>
        <h4>Open Your Dashboard</h4>
        <p>Get your dashboard token to access the OpenClaw Control UI:</p>
        <ol style={{ fontSize: 13, color: 'var(--text-dim)', lineHeight: 2, paddingLeft: 20, marginTop: 8 }}>
          <li>Open the <strong>Console</strong> tab and connect</li>
          <li>Run this command:</li>
        </ol>
        <CmdBox onCopy={addToast}>node dist/index.js dashboard --no-open</CmdBox>
        <ol start={3} style={{ fontSize: 13, color: 'var(--text-dim)', lineHeight: 2, paddingLeft: 20 }}>
          <li>You'll see a URL like: <code>/?token=abc123...</code> — copy the full token part</li>
          {profile && <li>Open <a href={profile.openclaw_url} target="_blank" rel="noopener">{profile.openclaw_url}</a> and append the token URL</li>}
        </ol>
        <div className="tip-box">Bookmark the full Dashboard URL! You'll need it every time you access the Control UI.</div>
      </div>

      {/* Step 4 */}
      <div className="guide-step">
        <div className="step-num">4</div>
        <h4>Approve Your Device</h4>
        <p>When you first open the Dashboard, your browser becomes a "Pending" device that needs approval:</p>
        <CmdBox onCopy={addToast}>node dist/index.js devices list</CmdBox>
        <p style={{ marginTop: 8 }}>If you see a device under "Pending", copy its Request ID and approve:</p>
        <CmdBox onCopy={addToast}>{'node dist/index.js devices approve <request-id>'}</CmdBox>
        <div className="tip-box">If the device is already shown under "Paired", skip this step — you're already connected!</div>
      </div>

      {/* Step 5 */}
      <div className="guide-step">
        <div className="step-num">5</div>
        <span className="step-badge popular">Popular</span>
        <h4>Connect Telegram</h4>
        <p>OpenClaw can answer you directly on Telegram:</p>
        <ol style={{ fontSize: 13, color: 'var(--text-dim)', lineHeight: 2, paddingLeft: 20, marginTop: 8 }}>
          <li>Open Telegram and send any message to your OpenClaw bot</li>
          <li>It will reply with a <strong>Pairing Code</strong> like: <code>FJ4VWG8R</code></li>
          <li>Go to Console and run:</li>
        </ol>
        <CmdBox onCopy={addToast}>node dist/index.js pairing approve telegram YOUR_CODE</CmdBox>
        <p style={{ fontSize: 12, color: 'var(--text-dim)', marginTop: 4 }}>Example: <code>node dist/index.js pairing approve telegram FJ4VWG8R</code></p>
        <div className="warn-box">Important: You must include <code>telegram</code> before the code. Just the code alone will give an error.</div>
      </div>

      {/* Step 6 */}
      <div className="guide-step">
        <div className="step-num">6</div>
        <span className="step-badge optional">Optional</span>
        <h4>Connect WhatsApp</h4>
        <p>To connect WhatsApp, run the channel login command in Console:</p>
        <CmdBox onCopy={addToast}>node dist/index.js channels login</CmdBox>
        <p style={{ marginTop: 4 }}>Select WhatsApp, then scan the QR code with your WhatsApp app (Linked Devices).</p>
      </div>

      {/* Step 7 */}
      <div className="guide-step">
        <div className="step-num">7</div>
        <h4>Start Chatting!</h4>
        <p>You're all set! Your AI assistant is now live. You can interact through:</p>
        <ul style={{ fontSize: 13, color: 'var(--text-dim)', lineHeight: 2, paddingLeft: 20, marginTop: 8 }}>
          <li><strong>Web Dashboard</strong> — the Control UI from Step 3</li>
          <li><strong>Telegram</strong> — send messages directly to your bot</li>
          <li><strong>WhatsApp</strong> — if connected in Step 6</li>
        </ul>
        <div className="tip-box">Try asking: "What can you do?" or "Help me organize my tasks" to get started.</div>
      </div>
    </div>
  );
}

// ===== Backups Page =====
function BackupsPage({ addToast }) {
  const [backups, setBackups] = useState([]);
  const [autoBackup, setAutoBackup] = useState(false);
  const [loading, setLoading] = useState(true);
  const [creating, setCreating] = useState(false);
  const [restoring, setRestoring] = useState(null);
  const [deleting, setDeleting] = useState(null);
  const [confirmRestore, setConfirmRestore] = useState(null);

  const load = useCallback(async () => {
    try {
      const data = await api.get('/api/user/backups');
      setBackups(data.backups || []);
      setAutoBackup(data.auto_backup === 1);
    } catch (err) { addToast(err.message, 'error'); }
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  const handleCreate = async () => {
    setCreating(true);
    try {
      await api.post('/api/user/backups');
      addToast('Backup created successfully!', 'success');
      load();
    } catch (err) { addToast(err.message, 'error'); }
    setCreating(false);
  };

  const handleRestore = async (id) => {
    setRestoring(id);
    setConfirmRestore(null);
    try {
      await api.post(`/api/user/backups/${id}/restore`);
      addToast('Backup restored! Service restarting...', 'success');
    } catch (err) { addToast(err.message, 'error'); }
    setRestoring(null);
  };

  const handleDelete = async (id) => {
    setDeleting(id);
    try {
      await api.request(`/api/user/backups/${id}`, { method: 'DELETE' });
      addToast('Backup deleted', 'success');
      load();
    } catch (err) { addToast(err.message, 'error'); }
    setDeleting(null);
  };

  const handleToggleAuto = async () => {
    const newVal = !autoBackup;
    try {
      await api.request('/api/user/backups/auto', { method: 'PUT', body: JSON.stringify({ enabled: newVal }) });
      setAutoBackup(newVal);
      addToast(`Auto-backup ${newVal ? 'enabled' : 'disabled'}`, 'success');
    } catch (err) { addToast(err.message, 'error'); }
  };

  const fmtSize = (bytes) => {
    if (!bytes) return '0 B';
    const units = ['B', 'KB', 'MB', 'GB'];
    const i = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
    return (bytes / Math.pow(1024, i)).toFixed(1) + ' ' + units[i];
  };

  const fmtDate = (d) => new Date(d).toLocaleString();
  const totalSize = backups.reduce((s, b) => s + (b.size_bytes || 0), 0);

  if (loading) return <div className="container" style={{ color: 'var(--text-dim)', paddingTop: 48 }}>Loading backups...</div>;

  return (
    <div className="container">
      <div style={{ marginBottom: 20 }}>
        <h2 style={{ fontSize: 22, fontWeight: 600 }}>Backups</h2>
        <p style={{ fontSize: 13, color: 'var(--text-dim)', marginTop: 4 }}>Backup and restore your OpenClaw data (configs, conversations, channels)</p>
      </div>

      {/* Actions Bar */}
      <div className="card">
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12 }}>
          <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
            <button className="btn btn-primary" onClick={handleCreate} disabled={creating} style={{ minWidth: 140 }}>
              {creating ? 'Creating...' : 'Create Backup'}
            </button>
            <span style={{ fontSize: 12, color: 'var(--text-dim)' }}>
              {backups.length} backup{backups.length !== 1 ? 's' : ''} | {fmtSize(totalSize)} used
            </span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={{ fontSize: 13, fontWeight: 500 }}>Auto-Backup (Daily)</span>
            <div onClick={handleToggleAuto} style={{
              width: 44, height: 24, borderRadius: 12, cursor: 'pointer', transition: 'background .2s',
              background: autoBackup ? 'var(--accent)' : '#d4d4d8', position: 'relative',
            }}>
              <div style={{
                width: 20, height: 20, borderRadius: 10, background: '#fff', position: 'absolute',
                top: 2, left: autoBackup ? 22 : 2, transition: 'left .2s', boxShadow: '0 1px 3px rgba(0,0,0,.2)',
              }} />
            </div>
          </div>
        </div>
        {autoBackup && (
          <div style={{ marginTop: 10, padding: '8px 12px', background: '#eef2ff', borderRadius: 8, fontSize: 12, color: 'var(--accent)' }}>
            Auto-backup runs daily. Keeps last 7 backups, older ones are automatically deleted.
          </div>
        )}
      </div>

      {/* Confirm Restore Modal */}
      {confirmRestore && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,.4)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 999 }}>
          <div className="card" style={{ maxWidth: 420, margin: 0 }}>
            <h3 style={{ color: 'var(--danger)', marginBottom: 8 }}>Confirm Restore</h3>
            <p style={{ fontSize: 13, color: 'var(--text-dim)', lineHeight: 1.6, marginBottom: 16 }}>
              This will <strong>replace all your current OpenClaw data</strong> with this backup and restart your service. This action cannot be undone.
            </p>
            <p style={{ fontSize: 12, color: 'var(--text-dim)', marginBottom: 16 }}>
              Backup: {fmtDate(confirmRestore.created_at)} ({fmtSize(confirmRestore.size_bytes)})
            </p>
            <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
              <button className="btn" onClick={() => setConfirmRestore(null)}>Cancel</button>
              <button className="btn btn-primary" style={{ background: 'var(--danger)', borderColor: 'var(--danger)' }}
                onClick={() => handleRestore(confirmRestore.id)} disabled={restoring === confirmRestore.id}>
                {restoring === confirmRestore.id ? 'Restoring...' : 'Yes, Restore'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Backup List */}
      {backups.length === 0 ? (
        <div className="card" style={{ textAlign: 'center', padding: 40 }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>{'📦'}</div>
          <p style={{ color: 'var(--text-dim)', fontSize: 14 }}>No backups yet</p>
          <p style={{ color: 'var(--text-muted)', fontSize: 12, marginTop: 4 }}>Click "Create Backup" to save your current OpenClaw data</p>
        </div>
      ) : (
        <div>
          {backups.map(b => (
            <div key={b.id} className="card" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 8, padding: '14px 20px' }}>
              <div>
                <div style={{ fontSize: 14, fontWeight: 500 }}>
                  {fmtDate(b.created_at)}
                  <span className="badge" style={{
                    marginLeft: 8,
                    background: b.type === 'auto' ? '#eef2ff' : '#f0fdf4',
                    color: b.type === 'auto' ? 'var(--accent)' : 'var(--success)',
                  }}>
                    {b.type === 'auto' ? 'Auto' : 'Manual'}
                  </span>
                </div>
                <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 2 }}>
                  {fmtSize(b.size_bytes)} | {b.filename}
                </div>
              </div>
              <div style={{ display: 'flex', gap: 6 }}>
                <button className="btn btn-primary" style={{ padding: '4px 12px', fontSize: 12 }}
                  onClick={() => setConfirmRestore(b)} disabled={restoring === b.id}>
                  {restoring === b.id ? 'Restoring...' : 'Restore'}
                </button>
                <button className="btn btn-danger" style={{ padding: '4px 12px', fontSize: 12 }}
                  onClick={() => handleDelete(b.id)} disabled={deleting === b.id}>
                  {deleting === b.id ? '...' : 'Delete'}
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Info */}
      <div className="card" style={{ background: '#f4f4f5', borderColor: '#e4e4e7' }}>
        <h3 style={{ marginBottom: 8 }}>About Backups</h3>
        <div style={{ fontSize: 12, color: 'var(--text-dim)', lineHeight: 1.8 }}>
          <div><strong>What is backed up:</strong> OpenClaw config, conversations, channels, workspace files</div>
          <div><strong>Storage:</strong> Vultr Cloud Object Storage (encrypted, redundant)</div>
          <div><strong>Auto-backup:</strong> Runs daily, keeps last 7 backups</div>
          <div><strong>Restore:</strong> Replaces current data with backup and restarts service</div>
        </div>
      </div>
    </div>
  );
}

// ===== Settings Page =====
function SettingsPage({ addToast }) {
  const [profile, setProfile] = useState(null);
  const [username, setUsername] = useState('');
  const [currentPassword, setCurrentPassword] = useState('');
  const [newPassword, setNewPassword] = useState('');
  const [confirmPassword, setConfirmPassword] = useState('');
  const [saving, setSaving] = useState(false);
  const [savingPw, setSavingPw] = useState(false);

  useEffect(() => {
    api.get('/api/user/profile').then(p => {
      setProfile(p);
      setUsername(p.username || '');
    }).catch(() => {});
  }, []);

  const handleUpdateName = async (e) => {
    e.preventDefault();
    if (!username || username === profile.username) return addToast('No changes to save', 'error');
    setSaving(true);
    try {
      const res = await api.request('/api/user/profile', {
        method: 'PUT',
        body: JSON.stringify({ username }),
      });
      addToast(res.message || 'Username updated!', 'success');
      setProfile(prev => ({ ...prev, username }));
    } catch (err) { addToast(err.message, 'error'); }
    setSaving(false);
  };

  const handleUpdatePassword = async (e) => {
    e.preventDefault();
    if (!currentPassword || !newPassword) return addToast('Fill in all password fields', 'error');
    if (newPassword !== confirmPassword) return addToast('New passwords do not match', 'error');
    if (newPassword.length < 6) return addToast('Password must be at least 6 characters', 'error');
    setSavingPw(true);
    try {
      const res = await api.request('/api/user/profile', {
        method: 'PUT',
        body: JSON.stringify({ currentPassword, newPassword }),
      });
      addToast(res.message || 'Password updated!', 'success');
      setCurrentPassword('');
      setNewPassword('');
      setConfirmPassword('');
    } catch (err) { addToast(err.message, 'error'); }
    setSavingPw(false);
  };

  if (!profile) return <div className="container" style={{ color: 'var(--text-dim)', paddingTop: 48 }}>Loading...</div>;

  return (
    <div className="container">
      <div style={{ marginBottom: 20 }}>
        <h2 style={{ fontSize: 22, fontWeight: 600 }}>Account Settings</h2>
        <p style={{ fontSize: 13, color: 'var(--text-dim)', marginTop: 4 }}>Manage your profile and security settings</p>
      </div>

      {/* Account Info (read-only) */}
      <div className="card">
        <h3>Account Information</h3>
        <div className="info-row">
          <span className="info-label">Email</span>
          <span className="info-value">{profile.email}</span>
        </div>
        <div className="info-row">
          <span className="info-label">Status</span>
          <span className={`badge badge-${profile.status}`}>{profile.status}</span>
        </div>
        <div className="info-row">
          <span className="info-label">Plan</span>
          <span className="info-value" style={{ color: '#7c3aed', fontWeight: 600 }}>Unlimited</span>
        </div>
        <div className="info-row">
          <span className="info-label">Member Since</span>
          <span className="info-value">{new Date(profile.created_at).toLocaleDateString()}</span>
        </div>
        <div style={{ marginTop: 10, padding: '8px 12px', background: '#f4f4f5', borderRadius: 8, fontSize: 12, color: 'var(--text-dim)' }}>
          Email cannot be changed. Contact admin if you need to update your email address.
        </div>
      </div>

      {/* Change Username */}
      <div className="card">
        <h3>Change Username</h3>
        <form onSubmit={handleUpdateName}>
          <div className="form-group">
            <label>Username</label>
            <input value={username} onChange={e => setUsername(e.target.value.toLowerCase())} placeholder="your-username" />
          </div>
          <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 12 }}>
            3-30 characters. Lowercase letters, numbers, and hyphens only.
          </div>
          <button className="btn btn-primary" type="submit" disabled={saving || username === profile.username}>
            {saving ? 'Saving...' : 'Update Username'}
          </button>
        </form>
      </div>

      {/* Change Password */}
      <div className="card">
        <h3>Change Password</h3>
        <form onSubmit={handleUpdatePassword}>
          <div className="form-group">
            <label>Current Password</label>
            <input type="password" value={currentPassword} onChange={e => setCurrentPassword(e.target.value)} placeholder="Enter current password" />
          </div>
          <div className="form-row">
            <div className="form-group">
              <label>New Password</label>
              <input type="password" value={newPassword} onChange={e => setNewPassword(e.target.value)} placeholder="Enter new password" />
            </div>
            <div className="form-group">
              <label>Confirm New Password</label>
              <input type="password" value={confirmPassword} onChange={e => setConfirmPassword(e.target.value)} placeholder="Confirm new password" />
            </div>
          </div>
          <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 12 }}>
            Minimum 6 characters. This also changes your SSH login password.
          </div>
          <button className="btn btn-primary" type="submit" disabled={savingPw || !currentPassword || !newPassword}>
            {savingPw ? 'Updating...' : 'Update Password'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ===== Main App =====
function App() {
  const [loggedIn, setLoggedIn] = useState(!!api.token);
  const [page, setPage] = useState('dashboard');
  const [toasts, setToasts] = useState([]);

  const addToast = useCallback((msg, type = 'success') => {
    const id = ++toastId;
    setToasts(prev => [...prev, { id, msg, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
  }, []);

  const logout = () => {
    localStorage.removeItem('user_token');
    api.token = null;
    setLoggedIn(false);
  };

  if (!loggedIn) {
    return <>
      <ToastContainer toasts={toasts} />
      <LoginPage onLogin={() => setLoggedIn(true)} addToast={addToast} />
    </>;
  }

  const pages = { dashboard: Dashboard, console: ConsolePage, guide: SetupGuidePage, backups: BackupsPage, settings: SettingsPage };
  const PageComponent = pages[page];

  return (
    <>
      <ToastContainer toasts={toasts} />
      <div className="topbar">
        <div className="topbar-brand">
          <h1>OpenClaw</h1>
          <span>User Panel</span>
        </div>
        <button className="btn" onClick={logout}>Logout</button>
      </div>
      <div className="nav-tabs">
        <div className={`nav-tab ${page === 'dashboard' ? 'active' : ''}`} onClick={() => setPage('dashboard')}>Dashboard</div>
        <div className={`nav-tab ${page === 'console' ? 'active' : ''}`} onClick={() => setPage('console')}>Console</div>
        <div className={`nav-tab ${page === 'guide' ? 'active' : ''}`} onClick={() => setPage('guide')}>Setup Guide</div>
        <div className={`nav-tab ${page === 'backups' ? 'active' : ''}`} onClick={() => setPage('backups')}>Backups</div>
        <div className={`nav-tab ${page === 'settings' ? 'active' : ''}`} onClick={() => setPage('settings')}>Settings</div>
      </div>
      <PageComponent addToast={addToast} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
